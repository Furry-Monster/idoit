name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: idoit
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: idoit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: idoit.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          VER=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' Cargo.toml | head -1)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.tag }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          TAG="${RAW#v}"
          if [[ "$VER" != "$TAG" ]]; then
            echo "Cargo.toml version ($VER) does not match tag ($TAG)"
            exit 1
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          NAME="idoit-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/$NAME"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$NAME/"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            (cd dist && "/c/Windows/System32/tar.exe" -a -c -f "../${NAME}.zip" "$NAME")
          else
            (cd dist && tar czf "../${NAME}.tar.gz" "$NAME")
          fi
          ls -la idoit-*.tar.gz idoit-*.zip 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: |
            idoit-*.tar.gz
            idoit-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Prepare assets and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp -v {} upload/ \;
          (cd upload && sha256sum idoit-* > checksums-sha256.txt)
          ls -la upload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes to crates.io when a version tag is pushed (not on workflow_dispatch, to avoid duplicate publishes).
  # Add repo secret CARGO_REGISTRY_TOKEN: https://crates.io/settings/tokens
  publish-crates-io:
    name: Publish crates.io
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.event.repository.fork == false
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          VER=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' Cargo.toml | head -1)
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$VER" != "$TAG" ]]; then
            echo "Cargo.toml version ($VER) does not match tag ($TAG)"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --verbose
